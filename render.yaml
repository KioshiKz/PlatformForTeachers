services:
  # Backend (Django)
  - type: web
    name: platformforteachers-backend
    runtime: python
    rootDir: backend
    buildCommand: "bash build.sh"
    startCommand: "python -m gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "platformforteachers-backend.onrender.com,.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://platformforteachers-frontend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://platformforteachers-frontend.onrender.com"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: DATABASE_URL
        fromDatabase:
          name: platformforteachers-db
          property: connectionString

  # Frontend (React/Vite)
  - type: web
    name: platformforteachers-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_URL
        value: "https://platformforteachers-backend.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: platformforteachers-db
    plan: free
